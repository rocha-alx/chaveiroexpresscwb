name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Copy 404.html and route fallback files for SPA routing
        run: |
          cp dist/chaveiro-express/browser/index.html dist/chaveiro-express/browser/404.html || true
          mkdir -p dist/chaveiro-express/browser/servicos dist/chaveiro-express/browser/contato dist/chaveiro-express/browser/inicio
          cp dist/chaveiro-express/browser/index.html dist/chaveiro-express/browser/servicos/index.html
          cp dist/chaveiro-express/browser/index.html dist/chaveiro-express/browser/contato/index.html
          cp dist/chaveiro-express/browser/index.html dist/chaveiro-express/browser/inicio/index.html
          cp dist/chaveiro-express/browser/index.html dist/chaveiro-express/browser/index.html || true
          find dist/chaveiro-express/browser -maxdepth 2 -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/chaveiro-express/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

