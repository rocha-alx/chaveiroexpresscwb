<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chaveiro Express</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var target = '/';

      if (path && path !== '/') {
        target = '/?/' + path.replace(/^\//, '').replace(/\/$/, '') + search + hash;
      }

      window.location.replace(target);
    })();
  </script>
</head>
<body>
</body>
</html>
